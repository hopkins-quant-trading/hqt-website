llingness to practice matter most \u2014 an interest in math, probability, or markets helps, and we teach the rest.' },\n      { q:'What does the application involve?', a:'A short application form. Shortlisted applicants are then invited to a conversation with the board.' },\n      { q:'What\u2019s the time commitment?', a:'Weekly sessions during the semester \u2014 interview prep, practice rounds, and speaker events \u2014 plus competition weekends for members who compete.' },\n      { q:'I have a question that isn\u2019t answered here.', a:'Email any board member \u2014 you\u2019ll find our emails on the About page \u2014 and we\u2019ll get back to you.' },\n    ];\n    return { faqs };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
